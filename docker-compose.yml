services:
  app:
    container_name: finances-sheet-app
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3080:3000"
    env_file:
      - .env
    environment:
      # Sobrescreve a DATABASE_URL do .env para usar o host 'db' na rede do Docker
      - DATABASE_URL=postgresql://user:password@db:5432/finances_sheet
    depends_on:
      - db
    networks:
      - app_network

  db:
    image: postgres:15-alpine
    container_name: finances-sheet-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: finances_sheet
    ports:
      - "3435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  postgres_data:
