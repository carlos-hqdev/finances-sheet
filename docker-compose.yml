version: '3.8'

services:
  app:
    container_name: finances-sheet-app
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/finances_sheet
      # Add other env vars here or use an env_file
      # - NEXTAUTH_SECRET=changeme
      # - NEXTAUTH_URL=http://localhost:3000
    depends_on:
      - db
    networks:
      - app_network

  db:
    image: postgres:15-alpine
    container_name: finances-sheet-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: finances_sheet
    ports:
      - "3435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  postgres_data:
